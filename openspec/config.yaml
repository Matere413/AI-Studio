# openspec/config.yaml — SDD Project Configuration
# Refreshed by sdd-init on 2026-06-30
schema: spec-driven

context: |
  Project: ai-studio
  Tech stack:
    - Frontend: Next.js 14+ App Router in ./view
    - Backend: Python 3.10+ / FastAPI via Modal in ./api
    - Frontend language: TypeScript (strict)
    - Styling: Tailwind CSS v3
    - Backend tooling: pytest + pytest-asyncio + httpx + websockets
    - Infrastructure: Modal (serverless GPU, scale-to-zero, T4/A100)
    - Generative Engine: ComfyUI (headless/API mode, JSON graph workflows)
    - Async Transport: WebSocket (websocket-client) + HTTP webhooks
    - Image Storage: S3/R2 object storage (planned)
  Architecture:
    - Hexagonal / feature-first architecture in view/src with shared, features, app layers
    - Smart Routing: single endpoint delegates to specialized JSON workflows
    - IaC via Modal decorators (@app.function, @modal.fastapi_endpoint)
    - Async-first: long-running inference with Job ID + webhook callback
    - Separation: business layer mutates JSON only; ComfyUI executes graph math
  Testing:
    - Frontend unit tests: node --experimental-strip-types --test via test/unit-tests.sh
    - Frontend contract tests: test/contract-ci.sh (next build + next start + contract verify)
    - Backend tests: python3 -m pytest
    - Frontend test files exist under view/src/**/*.test.ts(x)
    - Backend test files exist under api/src/tests/
  Conventions:
    - API format required for ComfyUI exports (Save API format)
    - No base64 images over primary API channels; use object storage URLs
    - .safetensors managed via modal.Volume, never in Docker image
    - Explicit dependencies in modal.Image.run_commands()

rules:
  proposal:
    - Include rollback plan for risky changes
  specs:
    - Use Given/When/Then for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
    - All specs in English unless explicitly requested otherwise
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
  tasks:
    - Group by phase, use hierarchical numbering
    - Keep tasks completable in one session
  apply:
    - Follow existing code patterns
    tdd: true
    test_command: "python3 -m pytest"
  verify:
    test_command: "python3 -m pytest"
    build_command: ""
    coverage_threshold: 0
  archive:
    - Warn before merging destructive deltas
  delivery:
    max_lines_per_pr: 400

testing:
  strict_tdd: true
  reason: Both frontend and backend test runners are present.
  test_runner: mixed
  test_layers:
    - frontend-unit
    - frontend-contract
    - backend-unit
    - backend-async
  linter: eslint (frontend)
  type_checker: tsc --noEmit (frontend)
  formatter: prettier (frontend)
  installed_test_packages:
    - pytest
    - pytest-asyncio
    - httpx
    - websockets
    - react-test-renderer
    - playwright
  coverage_available: false
