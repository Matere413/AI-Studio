<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI Studio Workspace · Matere Design</title>
  <style>
    @font-face {
      font-family: 'Silkscreen';
      src: url('matere-ds/matere-design-system/project/fonts/Silkscreen-Regular.woff2') format('woff2');
      font-weight: 400;
      font-display: swap;
    }
    @font-face {
      font-family: 'Pixelify Sans';
      src: url('matere-ds/matere-design-system/project/fonts/PixelifySans-Variable.woff2') format('woff2-variations');
      font-weight: 400 700;
      font-display: swap;
    }
    @font-face {
      font-family: 'VT323';
      src: url('matere-ds/matere-design-system/project/fonts/VT323-Regular.woff2') format('woff2');
      font-weight: 400;
      font-display: swap;
    }
    @font-face {
      font-family: 'Geist';
      src: url('matere-ds/matere-design-system/project/fonts/Geist-Variable.woff2') format('woff2-variations');
      font-weight: 100 900;
      font-display: swap;
    }

    :root {
      /* Core earth ladder */
      --earth-950: #1a0f08;
      --earth-900: #241509;
      --earth-800: #3d1f10;
      --earth-700: #5a2e15;
      --earth-100: #f0c59a;
      --earth-50:  #f7e4c9;

      /* Accents */
      --ember-700: #7a2e15;
      --ember-500: #b8491f;
      --ember-400: #d9551f;
      --wheat-500: #c79828;
      --sage-500:  #6b6a3a;

      /* Semantic Mapping */
      --bg-0: var(--earth-950);
      --bg-1: var(--earth-900);
      --bg-2: var(--earth-800);
      --fg-1: var(--earth-50);
      --fg-2: var(--earth-100);
      
      --accent: var(--ember-500);
      --accent-hover: var(--ember-400);

      /* Borders */
      --border-1: #4a2e1a;
      --border-2: #6b4423;

      /* Type Families */
      --font-display: 'Pixelify Sans', 'Silkscreen', ui-monospace, monospace;
      --font-pixel:   'Silkscreen', 'Pixelify Sans', monospace;
      --font-mono:    'VT323', 'Silkscreen', ui-monospace, monospace;
      --font-body:    'Geist', ui-sans-serif, system-ui, sans-serif;

      /* Spacing & Sizes */
      --space-1:  4px;
      --space-2:  8px;
      --space-3:  12px;
      --space-4:  16px;
      --space-5:  24px;
      --space-6:  32px;
      
      --shadow-2: 4px 4px 0 var(--earth-950);
      --border-w-3: 3px;
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      background: var(--bg-0);
      color: var(--fg-1);
      font-family: var(--font-body);
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Top Nav */
    .topnav {
      border-bottom: var(--border-w-3) solid var(--border-2);
      background: var(--bg-1);
      padding: var(--space-3) var(--space-5);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
      z-index: 10;
    }
    .topnav .logo {
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.06em;
      text-decoration: none;
    }
    .topnav nav {
      display: flex;
      gap: var(--space-5);
      font-family: var(--font-mono);
      font-size: 16px;
    }
    .topnav nav a {
      color: var(--fg-2);
      text-decoration: none;
      text-transform: uppercase;
      padding: var(--space-1) var(--space-2);
    }
    .topnav nav a.active, .topnav nav a:hover {
      color: var(--fg-1);
      background: var(--bg-2);
      border-radius: 2px;
    }

    /* Studio Layout */
    .studio-layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* Sidebar Controls */
    .sidebar {
      width: 340px;
      background: var(--bg-1);
      border-right: var(--border-w-3) solid var(--border-2);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      flex-shrink: 0;
    }

    .sidebar-header {
      padding: var(--space-4);
      border-bottom: 2px solid var(--border-1);
      font-family: var(--font-display);
      font-size: 18px;
      color: var(--fg-1);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .control-group {
      padding: var(--space-4);
      border-bottom: 2px solid var(--border-1);
    }

    .control-label {
      font-family: var(--font-mono);
      font-size: 14px;
      color: var(--fg-2);
      text-transform: uppercase;
      margin-bottom: var(--space-2);
      display: flex;
      justify-content: space-between;
    }

    /* Inputs */
    input[type="text"], input[type="number"], select, textarea {
      width: 100%;
      background: var(--bg-0);
      color: var(--fg-1);
      border: 2px solid var(--border-2);
      padding: var(--space-2) var(--space-3);
      font-family: var(--font-body);
      font-size: 14px;
      outline: none;
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--accent);
    }
    textarea {
      resize: vertical;
      min-height: 80px;
      font-family: var(--font-mono);
      font-size: 16px;
    }

    /* Range Slider */
    input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
      background: var(--bg-2);
      height: 4px;
      border-radius: 0;
      -webkit-appearance: none;
      margin: var(--space-2) 0;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      height: 16px;
      width: 12px;
      background: var(--accent);
      border: 2px solid var(--earth-950);
      cursor: pointer;
    }

    /* Grid layout for small inputs */
    .input-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-3);
    }

    /* Button */
    .btn {
      display: block;
      width: 100%;
      font-family: var(--font-pixel);
      font-size: 18px;
      text-align: center;
      text-transform: uppercase;
      background: var(--accent);
      color: var(--earth-50);
      padding: var(--space-3);
      border: var(--border-w-3) solid var(--border-2);
      box-shadow: var(--shadow-2);
      cursor: pointer;
      letter-spacing: 0.06em;
      margin-top: auto; /* push to bottom of a container if flex */
    }
    .btn:hover {
      background: var(--accent-hover);
      transform: translate(-2px, -2px);
      box-shadow: 6px 6px 0 var(--earth-950);
    }
    .btn:active {
      transform: translate(2px, 2px);
      box-shadow: 0 0 0 var(--earth-950);
    }

    /* Main Canvas Area */
    .canvas-area {
      flex: 1;
      background: var(--bg-0);
      position: relative;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Toolbar above canvas */
    .canvas-toolbar {
      padding: var(--space-3) var(--space-5);
      border-bottom: 2px solid var(--border-1);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--bg-1);
    }
    
    .status-badge {
      font-family: var(--font-mono);
      font-size: 14px;
      background: var(--bg-2);
      padding: var(--space-1) var(--space-3);
      border: 1px solid var(--border-2);
      color: var(--sage-500);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .status-badge::before {
      content: '';
      display: block;
      width: 8px; height: 8px;
      background: var(--sage-500);
      border-radius: 50%;
    }

    /* The Canvas / Image Preview */
    .canvas-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-6);
      overflow: auto;
    }

    .image-preview {
      background: var(--bg-1);
      border: var(--border-w-3) solid var(--border-2);
      box-shadow: var(--shadow-2);
      width: 100%;
      max-width: 600px;
      aspect-ratio: 1 / 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .image-preview::after {
      content: 'READY FOR GENERATION';
      font-family: var(--font-mono);
      font-size: 24px;
      color: var(--border-2);
      letter-spacing: 0.1em;
    }

    .image-overlay-info {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: rgba(26, 15, 8, 0.85);
      border-top: 2px solid var(--border-1);
      padding: var(--space-2) var(--space-3);
      font-family: var(--font-mono);
      font-size: 14px;
      color: var(--fg-2);
      display: flex;
      justify-content: space-between;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .image-preview:hover .image-overlay-info {
      opacity: 1;
    }

    /* CRT Effect */
    .crt::before {
      content: " ";
      display: block;
      position: absolute;
      top: 0; left: 0; bottom: 0; right: 0;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
      z-index: 2;
      background-size: 100% 2px, 3px 100%;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <!-- App Header -->
  <header class="topnav">
    <a href="ai-studio-main.html" class="logo">AI STUDIO <span style="font-family:var(--font-mono); font-size: 14px; color:var(--fg-2);">/ WS</span></a>
    <nav>
      <a href="#" class="active">Generate</a>
      <a href="#">Canvas</a>
      <a href="#">History</a>
    </nav>
  </header>

  <!-- Workspace -->
  <div class="studio-layout">
    
    <!-- Left Sidebar (Controls) -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <span>Parameters</span>
        <span style="font-family: var(--font-mono); font-size: 12px; color: var(--accent);">[ SDXL_1.0 ]</span>
      </div>

      <div class="control-group">
        <label class="control-label">Positive Prompt</label>
        <textarea placeholder="A brutalist mechanical keyboard resting on dark soil, sunset lighting..."></textarea>
      </div>

      <div class="control-group">
        <label class="control-label">Negative Prompt</label>
        <textarea style="min-height: 50px;" placeholder="blurry, low quality, oversaturated..."></textarea>
      </div>

      <div class="control-group input-grid">
        <div>
          <label class="control-label">Width</label>
          <select>
            <option>512</option>
            <option>768</option>
            <option selected>1024</option>
          </select>
        </div>
        <div>
          <label class="control-label">Height</label>
          <select>
            <option>512</option>
            <option>768</option>
            <option selected>1024</option>
          </select>
        </div>
      </div>

      <div class="control-group">
        <label class="control-label">
          <span>Steps</span>
          <span id="steps-val" style="color: var(--fg-1);">30</span>
        </label>
        <input type="range" min="1" max="100" value="30" oninput="document.getElementById('steps-val').innerText=this.value">
      </div>

      <div class="control-group">
        <label class="control-label">
          <span>CFG Scale</span>
          <span id="cfg-val" style="color: var(--fg-1);">7.5</span>
        </label>
        <input type="range" min="1" max="20" step="0.5" value="7.5" oninput="document.getElementById('cfg-val').innerText=this.value">
      </div>

      <div class="control-group">
        <label class="control-label">Seed <span style="font-size: 10px; cursor: pointer;">🎲 RND</span></label>
        <input type="number" placeholder="Random (-1)" />
      </div>

      <div style="padding: var(--space-4); margin-top: auto;">
        <button class="btn">Generate</button>
      </div>
    </aside>

    <!-- Main Canvas -->
    <main class="canvas-area crt">
      <div class="canvas-toolbar">
        <div class="status-badge">MODAL: IDLE</div>
        <div style="font-family: var(--font-mono); color: var(--fg-2); font-size: 14px;">
          Time: <span style="color: var(--fg-1);">0.0s</span> | VRAM: <span style="color: var(--fg-1);">0MB</span>
        </div>
      </div>

      <div class="canvas-container">
        <div class="image-preview">
          <!-- The overlay is revealed on hover, representing an image being present -->
          <div class="image-overlay-info">
            <span>1024x1024</span>
            <span>Seed: 84920482</span>
          </div>
        </div>
      </div>
    </main>

  </div>

</body>
</html>
