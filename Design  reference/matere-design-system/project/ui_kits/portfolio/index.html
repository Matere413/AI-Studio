<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Matere — Portfolio</title>
<link rel="icon" href="../../assets/matere-mark.svg">
<link rel="stylesheet" href="portfolio.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="Nav.jsx"></script>
<script type="text/babel" src="Hero.jsx"></script>
<script type="text/babel" src="ProjectCard.jsx"></script>
<script type="text/babel" src="WorkGrid.jsx"></script>
<script type="text/babel" src="AboutPanel.jsx"></script>
<script type="text/babel" src="ContactForm.jsx"></script>
<script type="text/babel" src="Footer.jsx"></script>

<script type="text/babel">
  const { useState, useEffect } = React;

  function App() {
    const [section, setSection] = useState(() => localStorage.getItem('mtr-section') || 'home');
    const [lang, setLang] = useState(() => localStorage.getItem('mtr-lang') || 'es');

    useEffect(() => { localStorage.setItem('mtr-section', section); }, [section]);
    useEffect(() => { localStorage.setItem('mtr-lang', lang); }, [lang]);

    return (
      <div className="app" data-screen-label={'portfolio-' + section}>
        <Nav section={section} setSection={setSection} lang={lang} setLang={setLang}/>
        {section === 'home' && <Hero lang={lang} goWork={() => setSection('work')} goContact={() => setSection('contact')}/>}
        {section === 'work' && <WorkGrid lang={lang}/>}
        {section === 'about' && <AboutPanel lang={lang}/>}
        {section === 'contact' && <ContactForm lang={lang}/>}
        <Footer lang={lang}/>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
