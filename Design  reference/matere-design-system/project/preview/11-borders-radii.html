<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body{ padding: 24px; height: 170px;}
  .row { gap: 20px; align-items:flex-end;}
  .b { background: var(--bg-2); color: var(--fg-1); padding: 14px 20px; font-family: var(--font-pixel); font-size: 10px; letter-spacing: 0.04em;}
  .lbl { font-family: var(--font-mono); font-size: 11px; color: var(--fg-muted); margin-top: 6px; text-align: center;}
  .cell { display: flex; flex-direction: column; align-items: center;}
</style></head>
<body>
<p class="card-title">Borders + radii · chunky is correct</p>
<div class="row">
  <div class="cell"><div class="b" style="border: 1px solid var(--border-2); border-radius:0">1px</div><div class="lbl">--border-w-1</div></div>
  <div class="cell"><div class="b" style="border: 2px solid var(--border-2); border-radius:0">2px</div><div class="lbl">--border-w-2</div></div>
  <div class="cell"><div class="b" style="border: 3px solid var(--border-2); border-radius:0">3px ★</div><div class="lbl">--border-w-3 (default)</div></div>
  <div class="cell"><div class="b" style="border: 4px solid var(--accent); border-radius:0">4px</div><div class="lbl">chunky / card</div></div>
  <div class="cell"><div class="b" style="border: 2px solid var(--border-2); border-radius:999px; padding: 6px 14px;">pill</div><div class="lbl">pill only for chips</div></div>
</div>
</body></html>
