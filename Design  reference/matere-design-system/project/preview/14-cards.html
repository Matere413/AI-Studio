<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body{ padding: 24px; height: 220px;}
  .row { gap: 16px; align-items: flex-start;}
  .card { background: var(--bg-2); border: 3px solid var(--border-2); padding: 16px; box-shadow: 4px 4px 0 var(--earth-950); flex: 1; min-width: 0;}
  .card h3 { font-family: var(--font-display); font-size: 20px; font-weight: 700; margin: 0 0 4px 0; letter-spacing: 0.03em;}
  .card p { font-family: var(--font-sans); font-size: 13px; line-height: 1.5; color: var(--fg-2); margin: 0;}
  .eb { font-family: 'Silkscreen',monospace; font-size: 9px; color: var(--accent); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 8px;}
  .card.accent { background: var(--accent); border-color: var(--earth-950); color: var(--paper); box-shadow: 4px 4px 0 var(--ember-700);}
  .card.accent h3, .card.accent p { color: var(--paper);}
  .card.accent .eb { color: var(--earth-900);}
  .card.paper { background: var(--paper); border-color: var(--earth-700); color: var(--ink); box-shadow: 4px 4px 0 var(--earth-700);}
  .card.paper h3 { color: var(--earth-900); font-family: var(--font-serif); font-style: italic;}
  .card.paper p { color: var(--earth-800);}
  .card.paper .eb { color: var(--ember-500);}
</style></head>
<body>
<p class="card-title">Cards · default · accent · paper</p>
<div class="row">
  <div class="card">
    <div class="eb">Project</div>
    <h3>Atardecer UI</h3>
    <p>Paleta y tipografía para apps cálidas. Pixel en los detalles.</p>
  </div>
  <div class="card accent">
    <div class="eb">Hot pick</div>
    <h3>Ember mode</h3>
    <p>Acento primario para CTAs, badges y elementos hero.</p>
  </div>
  <div class="card paper">
    <div class="eb">Editorial</div>
    <h3>Pieza sobre papel</h3>
    <p>Superficie cálida alterna. Usar para blog, long reads, about.</p>
  </div>
</div>
</body></html>
