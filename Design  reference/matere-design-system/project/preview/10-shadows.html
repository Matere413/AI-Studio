<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body{ padding: 24px; height: 170px;}
  .row { gap: 28px;}
  .card { background: var(--bg-2); border: 3px solid var(--border-2); padding: 14px 18px; font-family: var(--font-pixel); font-size: 10px; color: var(--fg-1); letter-spacing: 0.04em;}
  .s1 { box-shadow: var(--shadow-1); }
  .s2 { box-shadow: var(--shadow-2); }
  .s3 { box-shadow: var(--shadow-3); }
  .se { box-shadow: 4px 4px 0 var(--ember-700); background: var(--accent); color: var(--paper);}
</style></head>
<body>
<p class="card-title">Shadows · hard-offset pixel drops (no blur)</p>
<div class="row">
  <div class="card s1">2px 2px 0</div>
  <div class="card s2">4px 4px 0</div>
  <div class="card s3">6px 6px 0</div>
  <div class="card se">ember shadow</div>
</div>
</body></html>
