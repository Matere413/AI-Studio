<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<script src="../assets/icons.js"></script>
<style>
  body{ padding: 24px; height: 190px;}
  .grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 14px 10px; }
  .cell { display: flex; flex-direction: column; align-items: center; gap: 6px; color: var(--fg-1);}
  .cell svg { image-rendering: pixelated;}
  .n { font-family: 'Silkscreen', monospace; font-size: 8px; color: var(--fg-muted); letter-spacing: 0.04em; text-transform: uppercase;}
</style></head>
<body>
<p class="card-title">Iconography · 16×16 pixel set · crispEdges</p>
<div class="grid" id="grid"></div>
<script>
  const names = ['home','heart','star','search','menu','close','arrow_right','arrow_left','check','plus','sparkle','book','mail','user','settings','folder','moon','sun','download','link','external','github','terminal','flame'];
  const grid = document.getElementById('grid');
  names.forEach(n => {
    const div = document.createElement('div');
    div.className = 'cell';
    div.innerHTML = MatereIcon(n, { size: 28 }) + `<div class="n">${n.replace('_','-')}</div>`;
    grid.appendChild(div);
  });
</script>
</body></html>
