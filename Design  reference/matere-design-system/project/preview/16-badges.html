<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body{ padding: 24px; height: 180px;}
  .row { gap: 10px; flex-wrap: wrap;}
  .badge { font-family: 'Silkscreen',monospace; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; padding: 4px 8px; border: 2px solid var(--earth-950); display:inline-flex; align-items:center; gap:5px;}
  .b-default { background: var(--earth-800); color: var(--fg-2); border-color: var(--border-2);}
  .b-accent { background: var(--accent); color: var(--paper);}
  .b-wheat { background: var(--wheat-400); color: var(--earth-900);}
  .b-success { background: #7a9a4a; color: var(--earth-900);}
  .b-danger { background: #b33a2a; color: var(--paper);}
  .b-dot::before { content:''; width: 6px; height: 6px; background: currentColor; display:inline-block; margin-right: 2px;}
  .b-outline { background: transparent; border-color: var(--accent); color: var(--accent);}
</style></head>
<body>
<p class="card-title">Badges · tags · status pips</p>
<div class="row">
  <span class="badge b-default">draft</span>
  <span class="badge b-accent">new</span>
  <span class="badge b-wheat">v0.1</span>
  <span class="badge b-success b-dot">live</span>
  <span class="badge b-danger">error</span>
  <span class="badge b-outline">coming soon</span>
  <span class="badge b-default">★ 42</span>
  <span class="badge b-accent">hot pick</span>
  <span class="badge b-wheat">featured</span>
  <span class="badge b-default">español</span>
  <span class="badge b-default">english</span>
</div>
</body></html>
