<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body{ padding: 24px; height: 200px;}
  .row { gap: 16px; align-items: center; flex-wrap: wrap;}
  .btn { font-family: 'Silkscreen', monospace; font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase;
    padding: 10px 18px; border: 3px solid var(--earth-950); cursor: pointer; box-shadow: 3px 3px 0 var(--earth-950);
    transition: transform 90ms, box-shadow 90ms;
  }
  .btn:active { transform: translate(3px,3px); box-shadow: 0 0 0 var(--earth-950);}
  .primary { background: var(--accent); color: var(--paper);}
  .secondary { background: var(--bg-2); color: var(--fg-1);}
  .wheat { background: var(--wheat-400); color: var(--earth-900);}
  .ghost { background: transparent; color: var(--fg-1); box-shadow: none; border-color: var(--border-2);}
  .ghost:active { transform: none;}
  .small { padding: 6px 10px; font-size: 10px; box-shadow: 2px 2px 0 var(--earth-950);}
  .disabled { opacity: 0.4; cursor: not-allowed;}
</style></head>
<body>
<p class="card-title">Buttons · primary · secondary · wheat · ghost</p>
<div class="row">
  <button class="btn primary">Start</button>
  <button class="btn secondary">Cancel</button>
  <button class="btn wheat">Save</button>
  <button class="btn ghost">Learn more</button>
  <button class="btn primary small">+ Add</button>
  <button class="btn primary disabled">Disabled</button>
</div>
<p style="font-family:var(--font-mono);font-size:12px;color:var(--fg-muted);margin-top:16px;">Press state: translate(+3, +3) and drop the shadow — like a stamped key.</p>
</body></html>
