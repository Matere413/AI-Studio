<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body{ padding: 20px 24px; height: 200px; }
  .row { gap: 24px; align-items: flex-start;}
  .group { flex: 1; }
  .group h4 { font-family: var(--font-pixel); font-size: 10px; color: var(--fg-muted); margin:0 0 8px 0; letter-spacing: var(--tracking-pixel); text-transform: uppercase;}
  .scale { display: grid; grid-template-columns: repeat(6, 1fr); gap: 3px;}
  .sw { height: 50px; display: flex; flex-direction:column; justify-content:flex-end; padding: 4px 6px;}
  .sw .n { font-family: var(--font-pixel); font-size: 8px;}
  .dark { color: var(--fg-1);} .light { color: var(--earth-900);}
</style></head>
<body>
<p class="card-title">Colors · Accents (ember, wheat, sage)</p>
<div class="row">
  <div class="group">
    <h4>Ember — primary accent</h4>
    <div class="scale">
      <div class="sw dark" style="background:#7a2e15"><div class="n">700</div></div>
      <div class="sw dark" style="background:#9c3a1a"><div class="n">600</div></div>
      <div class="sw dark" style="background:#b8491f"><div class="n">500★</div></div>
      <div class="sw dark" style="background:#d9551f"><div class="n">400</div></div>
      <div class="sw light" style="background:#e8703a"><div class="n">300</div></div>
      <div class="sw light" style="background:#f2955c"><div class="n">200</div></div>
    </div>
  </div>
  <div class="group">
    <h4>Wheat — secondary</h4>
    <div class="scale" style="grid-template-columns: repeat(5,1fr);">
      <div class="sw dark" style="background:#6b4a16"><div class="n">700</div></div>
      <div class="sw light" style="background:#c79828"><div class="n">500</div></div>
      <div class="sw light" style="background:#e0b040"><div class="n">400</div></div>
      <div class="sw light" style="background:#f2c75a"><div class="n">300</div></div>
      <div class="sw light" style="background:#fad98a"><div class="n">200</div></div>
    </div>
  </div>
  <div class="group">
    <h4>Sage — support</h4>
    <div class="scale" style="grid-template-columns: repeat(3,1fr);">
      <div class="sw dark" style="background:#3a3a22"><div class="n">700</div></div>
      <div class="sw dark" style="background:#6b6a3a"><div class="n">500</div></div>
      <div class="sw light" style="background:#9a9966"><div class="n">300</div></div>
    </div>
  </div>
</div>
</body></html>
