<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body{ padding: 24px; height: 200px;}
  .bars { display: flex; flex-direction: column; gap: 10px;}
  .bar { display: flex; align-items: center; gap: 12px;}
  .track { flex: 1; height: 14px; background: var(--earth-900); border: 2px solid var(--earth-950); position: relative; overflow: hidden;}
  .fill { height: 100%; background: repeating-linear-gradient(90deg, var(--accent) 0 6px, var(--ember-400) 6px 8px); }
  .lbl { font-family: 'Silkscreen',monospace; font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; width: 110px; color: var(--fg-3);}
  .pct { font-family: var(--font-mono); font-size: 14px; color: var(--fg-2); width: 44px; text-align: right;}
  .row { display:flex; gap: 20px; align-items: center; margin-top: 14px;}
  .dots { display:flex; gap: 4px;}
  .dot { width: 10px; height: 10px; background: var(--earth-800); border: 1px solid var(--earth-950);}
  .dot.on { background: var(--accent);}
  .cap { font-family: var(--font-mono); font-size: 12px; color: var(--fg-muted);}
</style></head>
<body>
<p class="card-title">Progress · XP bar · step pips</p>
<div class="bars">
  <div class="bar"><div class="lbl">Design</div><div class="track"><div class="fill" style="width:80%"></div></div><div class="pct">80%</div></div>
  <div class="bar"><div class="lbl">Build</div><div class="track"><div class="fill" style="width:45%"></div></div><div class="pct">45%</div></div>
  <div class="bar"><div class="lbl">Polish</div><div class="track"><div class="fill" style="width:15%"></div></div><div class="pct">15%</div></div>
</div>
<div class="row">
  <div class="dots">
    <span class="dot on"></span><span class="dot on"></span><span class="dot on"></span><span class="dot on"></span>
    <span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span>
  </div>
  <div class="cap">step 4 of 8 — onboarding</div>
</div>
</body></html>
