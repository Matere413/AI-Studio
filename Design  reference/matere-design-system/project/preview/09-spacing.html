<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body{ padding: 20px 24px; height: 200px;}
  .grid { display:grid; grid-template-columns: repeat(7, 1fr); gap: 8px; align-items: end;}
  .box { background: var(--accent); border: 2px solid var(--earth-950);}
  .cell { display: flex; flex-direction: column; align-items: center; gap: 6px;}
  .lbl { font-family: var(--font-pixel); font-size: 9px; color: var(--fg-muted); letter-spacing: 0.04em;}
  .n { font-family: var(--font-mono); font-size: 12px; color: var(--fg-3);}
</style></head>
<body>
<p class="card-title">Spacing · 4px base scale</p>
<div class="grid">
  <div class="cell"><div class="box" style="width:4px;height:4px"></div><div class="lbl">1</div><div class="n">4px</div></div>
  <div class="cell"><div class="box" style="width:8px;height:8px"></div><div class="lbl">2</div><div class="n">8px</div></div>
  <div class="cell"><div class="box" style="width:12px;height:12px"></div><div class="lbl">3</div><div class="n">12px</div></div>
  <div class="cell"><div class="box" style="width:16px;height:16px"></div><div class="lbl">4</div><div class="n">16px</div></div>
  <div class="cell"><div class="box" style="width:24px;height:24px"></div><div class="lbl">5</div><div class="n">24px</div></div>
  <div class="cell"><div class="box" style="width:32px;height:32px"></div><div class="lbl">6</div><div class="n">32px</div></div>
  <div class="cell"><div class="box" style="width:48px;height:48px"></div><div class="lbl">7</div><div class="n">48px</div></div>
</div>
</body></html>
