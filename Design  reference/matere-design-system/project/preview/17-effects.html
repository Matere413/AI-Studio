<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body{ padding: 0; height: 200px; background: var(--bg-0); overflow:hidden;}
  .stage { position: relative; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; gap: 40px;}
  .stage::after {content:'';position:absolute;inset:0;pointer-events:none;z-index:10;background-image:repeating-linear-gradient(to bottom,rgba(0,0,0,0.12) 0,rgba(0,0,0,0.12) 1px,transparent 1px,transparent 3px);mix-blend-mode:multiply;}
  .stage::before{content:'';position:absolute;inset:0;z-index:9;pointer-events:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='140' height='140'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.55 0 0 0 0 0.35 0 0 0 0 0.15 0 0 0 0.4 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");opacity:0.22;mix-blend-mode:overlay;}
  .label { font-family: 'Silkscreen',monospace; font-size: 10px; color: var(--fg-muted); letter-spacing: 0.08em; text-transform:uppercase; position: absolute; bottom: 8px; left: 12px; z-index: 11;}
  .demo { font-family: var(--font-display); font-size: 40px; color: var(--paper); letter-spacing: 0.04em; z-index: 1;}
  .demo2 { font-family: var(--font-mono); font-size: 22px; color: var(--earth-200); z-index: 1;}
</style></head>
<body>
<div class="stage">
  <div class="label">CRT scanlines · warm grain · always on background</div>
  <div class="demo">MATERE</div>
  <div class="demo2">~/ansiosos por pintar</div>
</div>
</body></html>
