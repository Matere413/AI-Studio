<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body{ padding: 24px; height: 180px; }
  .row { gap: 18px; }
  .logo-cell { display:flex; flex-direction:column; align-items:center; gap:8px; padding: 14px; border: 2px solid var(--border-1); background: var(--bg-2); }
  .logo-cell.inv { background: var(--paper); color: var(--ink); border-color: var(--paper-2); }
  .logo-cell.accent { background: var(--accent); }
  .logo-cell .lbl { font-family: var(--font-pixel); font-size: 9px; letter-spacing: var(--tracking-pixel); text-transform: uppercase; color: var(--fg-muted);}
  .logo-cell.inv .lbl { color: var(--earth-700); }
  .logo-cell.accent .lbl { color: var(--earth-900); }
</style></head>
<body>
<p class="card-title">Logo · mark + lockups</p>
<div class="row">
  <div class="logo-cell"><img src="../assets/matere-mark.svg" width="64" height="64" style="image-rendering:pixelated"><div class="lbl">Mark / dark</div></div>
  <div class="logo-cell inv"><img src="../assets/matere-mark.svg" width="64" height="64" style="image-rendering:pixelated"><div class="lbl">Mark / paper</div></div>
  <div class="logo-cell accent"><img src="../assets/matere-mark-ember.svg" width="64" height="64" style="image-rendering:pixelated"><div class="lbl">Mark / ember</div></div>
  <div class="logo-cell" style="flex:1; justify-content:center;"><img src="../assets/matere-wordmark.svg" width="200" style="image-rendering:pixelated"><div class="lbl">Wordmark</div></div>
</div>
</body></html>
