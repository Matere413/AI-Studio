<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body{ padding: 24px; height: 230px;}
  .col { gap: 14px;}
  label { font-family: 'Silkscreen', monospace; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-3); display:block; margin-bottom: 6px;}
  input, textarea { font-family: 'Silkscreen', monospace; font-size: 13px; letter-spacing: 0.06em; background: var(--earth-950); color: var(--fg-1); border: 2px solid var(--border-2); padding: 12px 12px; width: 320px; outline: none; box-sizing: border-box; line-height: 1.5;}
  input:focus, textarea:focus { border-color: var(--accent); }
  .with-cursor { display: inline-flex; align-items: center; gap: 0; background: var(--earth-950); border: 2px solid var(--accent); padding: 12px 12px; font-family: 'Silkscreen', monospace; font-size: 13px; letter-spacing: 0.06em; color: var(--fg-1); min-width: 320px;}
  .cursor { display: inline-block; width: 9px; height: 18px; background: var(--accent); animation: blink 1s steps(2) infinite;}
  @keyframes blink { 50% { opacity: 0; }}
  .group { display: flex; gap: 24px; align-items: flex-start;}
  .chip { display:inline-flex; align-items:center; gap:6px; padding: 4px 10px; background: var(--earth-800); border: 1px solid var(--border-2); font-family: 'Silkscreen',monospace; font-size: 10px; color: var(--fg-2); text-transform: uppercase; letter-spacing: 0.06em;}
  .chip.on { background: var(--accent); color: var(--paper); border-color: var(--earth-950);}
  .chips { display:flex; gap: 6px; flex-wrap: wrap;}
</style></head>
<body>
<p class="card-title">Inputs · blinking cursor · focus ember</p>
<div class="group">
  <div>
    <label>NAME</label>
    <input value="Matere">
    <label style="margin-top:12px">SEARCH (focused)</label>
    <div class="with-cursor">buscando<span class="cursor"></span></div>
  </div>
  <div>
    <label>TAGS</label>
    <div class="chips">
      <span class="chip on">pixel</span>
      <span class="chip on">warm</span>
      <span class="chip">retro</span>
      <span class="chip">ui</span>
      <span class="chip">craft</span>
    </div>
    <label style="margin-top:14px">NOTE</label>
    <textarea rows="2" style="width:260px">A veces basta con un píxel.</textarea>
  </div>
</div>
</body></html>
