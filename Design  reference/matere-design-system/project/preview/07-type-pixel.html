<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body{ padding: 20px 24px; height: 220px;}
  .stack { display: flex; flex-direction: column; gap: 12px;}
  .item { display: flex; align-items: baseline; gap: 16px; }
  .spec { font-family: var(--font-mono); font-size: 11px; color: var(--fg-muted); width: 160px; flex-shrink:0;}
  .sample { flex: 1; color: var(--fg-1);}
</style></head>
<body>
<p class="card-title">Type · Pixel display · Silkscreen (eyebrows · labels · chrome)</p>
<div class="stack">
  <div class="item">
    <div class="spec">EYEBROW · 12px</div>
    <div class="sample" style="font-family:'Silkscreen',monospace;font-size:12px;letter-spacing:0.1em;text-transform:uppercase;color:var(--accent);">NEW RELEASE · V0.1</div>
  </div>
  <div class="item">
    <div class="spec">LABEL · 14px</div>
    <div class="sample" style="font-family:'Silkscreen',monospace;font-size:14px;letter-spacing:0.06em;text-transform:uppercase;">START GAME</div>
  </div>
  <div class="item">
    <div class="spec">PIXEL H · 22px</div>
    <div class="sample" style="font-family:'Silkscreen',monospace;font-weight:700;font-size:22px;letter-spacing:0.04em;">PLAY · PAUSE · SAVE</div>
  </div>
  <div class="item">
    <div class="spec">BODY · avoid &gt; 1 line</div>
    <div class="sample" style="font-family:'Silkscreen',monospace;font-size:12px;line-height:1.6;color:var(--fg-2);">Usa Silkscreen solo en chrome. Para lectura larga — switch a Geist o Newsreader.</div>
  </div>
</div>
</body></html>
