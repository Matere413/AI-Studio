<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body{ padding: 20px 24px; height: 180px; }
  .scale { display: grid; grid-template-columns: repeat(11, 1fr); gap: 4px; margin-top: 8px;}
  .sw { height: 72px; display: flex; flex-direction: column; justify-content: flex-end; padding: 6px 8px; border: 1px solid rgba(0,0,0,0.2);}
  .sw .n { font-family: var(--font-pixel); font-size: 9px; letter-spacing: 0.04em; }
  .sw .h { font-family: var(--font-mono); font-size: 11px; opacity: 0.8;}
  .dark { color: var(--fg-1); } .light { color: var(--earth-900); }
</style></head>
<body>
<p class="card-title">Colors · Earth scale (950 → 50)</p>
<div class="scale">
  <div class="sw dark" style="background:#1a0f08"><div class="n">950</div><div class="h">1a0f08</div></div>
  <div class="sw dark" style="background:#241509"><div class="n">900</div><div class="h">241509</div></div>
  <div class="sw dark" style="background:#3d1f10"><div class="n">800</div><div class="h">3d1f10</div></div>
  <div class="sw dark" style="background:#5a2e15"><div class="n">700</div><div class="h">5a2e15</div></div>
  <div class="sw dark" style="background:#7a3e1e"><div class="n">600</div><div class="h">7a3e1e</div></div>
  <div class="sw dark" style="background:#a0532a"><div class="n">500</div><div class="h">a0532a</div></div>
  <div class="sw light" style="background:#c66a32"><div class="n">400</div><div class="h">c66a32</div></div>
  <div class="sw light" style="background:#d97a3c"><div class="n">300</div><div class="h">d97a3c</div></div>
  <div class="sw light" style="background:#e8a76b"><div class="n">200</div><div class="h">e8a76b</div></div>
  <div class="sw light" style="background:#f0c59a"><div class="n">100</div><div class="h">f0c59a</div></div>
  <div class="sw light" style="background:#f7e4c9"><div class="n">50</div><div class="h">f7e4c9</div></div>
</div>
</body></html>
