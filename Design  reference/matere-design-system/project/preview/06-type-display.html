<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body{ padding: 20px 24px; height: 240px;}
  .stack { display: flex; flex-direction: column; gap: 14px;}
  .item { display: flex; align-items: baseline; gap: 16px; border-bottom: 1px dashed var(--border-1); padding-bottom: 10px;}
  .spec { font-family: var(--font-mono); font-size: 11px; color: var(--fg-muted); width: 180px; flex-shrink:0;}
  .sample { flex: 1; color: var(--fg-1); }
</style></head>
<body>
<p class="card-title">Type · Display scale (Pixelify Sans)</p>
<div class="stack">
  <div class="item">
    <div class="spec">H1 · 64px / 700 / tight</div>
    <div class="sample" style="font-family:var(--font-display);font-size:48px;font-weight:700;line-height:1;letter-spacing:0.03em;">Matere</div>
  </div>
  <div class="item">
    <div class="spec">H2 · 36px / 700</div>
    <div class="sample" style="font-family:var(--font-display);font-size:30px;font-weight:700;letter-spacing:0.04em;">Interfaces con alma</div>
  </div>
  <div class="item">
    <div class="spec">H3 · 28px / 400</div>
    <div class="sample" style="font-family:var(--font-display);font-size:22px;font-weight:400;letter-spacing:0.04em;">pixel craft, tierra cálida</div>
  </div>
</div>
</body></html>
