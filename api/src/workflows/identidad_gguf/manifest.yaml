# Manifest for identidad_gguf workflow.
# Service layer downloads image_url and injects base64 data before execution.

inputs:
  prompt:
    node_id: "4"
    field: "text"
  image_url:
    node_id: "6"
    field: "image_url"
  width:
    node_id: "5"
    field: "width"
  height:
    node_id: "5"
    field: "height"
  seed:
    node_id: "11"
    field: "seed"
  gguf:
    node_id: "1"
    field: "unet_name"
  clip:
    node_id: "2"
    field: "clip_name1"
  pulid:
    node_id: "16"
    field: "pulid_file"
  face_detector:
    node_id: "13"
    field: "model_name"

defaults:
  width: 1024
  height: 1024
  seed: -1
  gguf: "flux1-dev-q4_k_m.gguf"
  clip: "t5xxl_fp8_e4m3fn.safetensors"
  pulid: "pulid_flux_v0.9.1.safetensors"
  face_detector: "face_yolov8m.onnx"
