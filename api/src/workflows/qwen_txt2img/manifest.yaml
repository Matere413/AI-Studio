# Manifest for qwen_txt2img workflow.
# Service layer resolves quality_mode into sampler defaults before execution.

inputs:
  prompt:
    node_id: "7"
    field: "text"
  negative_prompt:
    node_id: "8"
    field: "text"
  width:
    node_id: "5"
    field: "width"
  height:
    node_id: "5"
    field: "height"
  steps:
    node_id: "6"
    field: "steps"
  cfg:
    node_id: "6"
    field: "cfg"
  sampler_name:
    node_id: "6"
    field: "sampler_name"
  sampler_scheduler:
    node_id: "6"
    field: "scheduler"
  unet:
    node_id: "1"
    field: "unet_name"
  clip:
    node_id: "2"
    field: "clip_name"
  vae:
    node_id: "3"
    field: "vae_name"

defaults:
  width: 1024
  height: 1024
  quality_mode: "high"
  steps: 50
  cfg: 7.0
  sampler_name: "euler_ancestral"
  sampler_scheduler: "normal"
  unet: "qwen_image_2512_fp8_e4m3fn.safetensors"
  clip: "qwen_2.5_vl_7b_fp8_scaled.safetensors"
  vae: "qwen_image_vae.safetensors"
