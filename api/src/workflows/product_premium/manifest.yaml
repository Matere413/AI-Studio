# Manifest for the product_premium workflow.
# Keeps prompt-first generation while owning format dimensions in the workflow contract.

inputs:
  prompt:
    node_id: "6"
    field: "text"
  checkpoint:
    node_id: "4"
    field: "ckpt_name"
  width:
    node_id: "5"
    field: "width"
  height:
    node_id: "5"
    field: "height"
  negative_prompt:
    node_id: "7"
    field: "text"

default_checkpoint: juggernautXL_ragnarok.safetensors
default_format: square

formats:
  square:
    width: 1024
    height: 1024
  vertical:
    width: 720
    height: 1280
