# Manifest for FLUX + ControlNet composition workflow.
# Graph: LoadImage(bg) → Preprocessor → ControlNetApply → KSampler
#        LoadImage(fg) → VAEEncode ────────────────┘
#        CLIPTextEncode ────────────────────────────┘

inputs:
  prompt:
    node_id: "3"
    field: "text"
  background_image:
    node_id: "1"
    field: "image"
  foreground_image:
    node_id: "2"
    field: "image"
  control_mode:
    node_id: "16"
    field: "value"
  unet:
    node_id: "8"
    field: "unet_name"
  clip:
    node_id: "10"
    field: "clip_name"
  vae:
    node_id: "9"
    field: "vae_name"

defaults:
  unet: "flux2_dev_fp8mixed.safetensors"
  clip: "mistral_3_small_flux2_bf16.safetensors"
  vae: "full_encoder_small_decoder.safetensors"

outputs:
  artifacts:
    - name: composed_image
      media_type: image/png
      has_alpha: false
